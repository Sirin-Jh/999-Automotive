<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | 999 Automotive</title>
    <!-- Fonts -->
    <link href="css2.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Color Palette */
            --bg-dark: #0f0f0f;
            --bg-surface: #1a1a1a;
            --accent: #ff6a00;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3 { font-weight: 700; }
        h2 { 
            font-size: 2.5rem; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        h2 span { color: var(--accent); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 4px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
        }
        .btn-primary { 
            background-color: var(--accent); 
            color: #fff; 
            width: 100%;
        }
        .btn-primary:hover { 
            background-color: transparent; 
            border-color: var(--accent); 
            color: var(--accent); 
        }

        /* Navbar */
        header {
            position: fixed;
            top: 0; 
            width: 100%;
            background-color: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .logo { 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: #fff; 
            text-decoration: none; 
            letter-spacing: 2px; 
        }
        .logo span { color: var(--accent); }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500; 
            text-transform: uppercase; 
            transition: var(--transition); 
            margin-right: 30px;
        }
        .nav-links a:hover { color: var(--accent); }
        .nav-links a.active { color: var(--accent); font-weight: 700; }

        .cart-icon-btn {
            position: relative;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .cart-icon-btn:hover { color: var(--accent); }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background-color: var(--accent);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Shop Layout */
        main { padding: 120px 5% 80px; min-height: 80vh; }
        .shop-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .shop-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background-color: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 106, 0, 0.3);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .product-info {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-title {
            font-size: 1.25rem;
            margin-bottom: 10px;
            color: #fff;
        }
        .product-price {
            font-size: 1.4rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 20px;
        }
        .add-to-cart-btn {
            margin-top: auto;
        }

        /* Cart Sidebar */
        .cart-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .cart-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .cart-sidebar {
            position: fixed;
            top: 0; right: -400px; width: 400px; height: 100%;
            background-color: var(--bg-surface);
            z-index: 1002;
            box-shadow: -5px 0 30px rgba(0,0,0,0.8);
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        
        .cart-header {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-cart {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .close-cart:hover { color: var(--accent); transform: rotate(90deg); }

        .cart-items {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .cart-item {
            display: flex;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }
        .cart-item-img {
            width: 70px; height: 70px;
            border-radius: 8px;
            object-fit: cover;
        }
        .cart-item-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cart-item-title { font-weight: 600; font-size: 0.95rem; }
        .cart-item-price { color: var(--accent); font-weight: 600; }
        
        .cart-item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--bg-dark);
            border-radius: 4px;
            padding: 2px;
        }
        .qty-btn {
            background: none; border: none;
            color: #fff; width: 25px; height: 25px;
            cursor: pointer; font-size: 1rem;
        }
        .qty-btn:hover { color: var(--accent); }
        .remove-item {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            transition: var(--transition); font-size: 0.9rem;
        }
        .remove-item:hover { color: #ff3333; }
        
        .empty-cart-msg {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
            display: none;
        }

        .cart-footer {
            padding: 25px;
            background-color: var(--bg-dark);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .cart-total span:last-child { color: var(--accent); }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 10000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-weight: 500;
            transition: bottom 0.5s, opacity 0.5s;
            opacity: 0;
            border-bottom: 3px solid var(--accent);
        }
        #toast.show {
            visibility: visible;
            bottom: 50px;
            opacity: 1;
        }

        /* Footer */
        footer {
            background-color: #050505;
            text-align: center;
            padding: 50px 20px 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        footer .logo { font-size: 2rem; display: inline-block; margin-bottom: 10px; }

        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .nav-links a { display: none; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="index.html" class="logo">999<span>AUTOMOTIVE</span></a>
        <div style="display: flex; align-items: center;">
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Shop</a>
            </nav>
            <button class="cart-icon-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- Main Shop Section -->
    <main>
        <div class="shop-header">
            <h2>Premium <span>Products</span></h2>
            <p>Professional grade detailing supplies designed to give your car a showroom finish.</p>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be injected by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <a href="index.html" class="logo">999<span>AUTOMOTIVE</span></a>
        <p style="font-size: 0.85rem; color: #666; margin-top:15px;">&copy; 2026 999Automotive. All Rights Reserved.</p>
    </footer>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItemsContainer">
            <div class="empty-cart-msg" id="emptyCartMsg">
                <i class="fas fa-shopping-basket" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                <p>Your cart is empty.</p>
            </div>
            <!-- Cart items injected here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalPrice">₹0</span>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="checkoutWhatsApp()">
                <i class="fab fa-whatsapp" style="font-size: 1.2rem;"></i> Checkout via WhatsApp
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Item added to cart!</div>

    <script>
        // Dummy Product Data
        // Dummy Product Data with Real Images and Pricing
        const products = [
            { id: 1, name: "Premium Car Wash Shampoo", originalPrice: 850, price: 650, img: "image-1.jpg" },
            { id: 2, name: "Microfiber Detailing Cloth (Pack of 3)", originalPrice: 699, price: 499, img: "image-2.jpg" },
            { id: 3, name: "Ceramic Coating Spray", originalPrice: 1599, price: 1299, img: "image-3.jpg" },
            { id: 4, name: "Interior Detailer & Protectant", originalPrice: 1100, price: 850, img: "image-4.jpg" },
            { id: 5, name: "High Gloss Tire Shine Gel", originalPrice: 950, price: 750, img: "image-5.jpg" },
            { id: 6, name: "Streak-Free Glass Cleaner", originalPrice: 550, price: 450, img: "image-6.jpg" }
        ];

        // Cart State
        let cart = JSON.parse(localStorage.getItem('999AutomotiveCart')) || [];

        // Initialize Shop
        function initShop() {
            const grid = document.getElementById('productsGrid');
            products.forEach(product => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${product.img}" alt="${product.name}" class="product-img">
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-price">
                                <span style="text-decoration: line-through; color: var(--text-muted); font-size: 1.1rem; margin-right: 10px; font-weight: normal;">₹${product.originalPrice}</span>
                                ₹${product.price}
                            </div>
                            <button class="btn btn-primary add-to-cart-btn" onclick="addToCart(${product.id})">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
            updateCartUI();
        }

        // Add to Cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveCart();
            updateCartUI();
            showToast();
        }

        // Modify Quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(p => p.id !== productId);
                }
                saveCart();
                updateCartUI();
            }
        }

        // Remove from Cart
        function removeFromCart(productId) {
            cart = cart.filter(p => p.id !== productId);
            saveCart();
            updateCartUI();
        }

        // Save to LocalStorage
        function saveCart() {
            localStorage.setItem('999AutomotiveCart', JSON.stringify(cart));
        }

        // Update UI (Count & Sidebar)
        function updateCartUI() {
            // Update bubble count
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').innerText = totalItems;
            
            // Render cart items
            const container = document.getElementById('cartItemsContainer');
            const emptyMsg = document.getElementById('emptyCartMsg');
            
            // Clear existing ignoring the empty msg div
            const items = container.querySelectorAll('.cart-item');
            items.forEach(el => el.remove());

            if (cart.length === 0) {
                emptyMsg.style.display = 'block';
                document.getElementById('cartTotalPrice').innerText = '₹0';
                return;
            }
            
            emptyMsg.style.display = 'none';
            let total = 0;

            cart.forEach(item => {
                const subT = item.price * item.quantity;
                total += subT;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}" class="cart-item-img">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-actions">
                                <div class="cart-item-price">₹${item.price}</div>
                                <div class="qty-controls">
                                    <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                    <span style="font-size: 0.9rem; width: 15px; text-align:center;">${item.quantity}</span>
                                    <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                                </div>
                                <button class="remove-item" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('cartTotalPrice').innerText = `₹${total}`;
        }

        // Toggle Sidebar Cart
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('cartOverlay').classList.toggle('active');
        }

        // Toast Notification
        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // WhatsApp Checkout
        function checkoutWhatsApp() {
            if (cart.length === 0) return alert("Your cart is empty!");
            
            let message = "Hello 999 Automotive! I would like to place an order:%0A%0A";
            let total = 0;
            
            cart.forEach(item => {
                const subT = item.price * item.quantity;
                total += subT;
                message += `- ${item.quantity}x ${item.name} (₹${item.price})%0A`;
            });
            
            message += `%0A*Total: ₹${total}*`;
            
            // Replaced with the provided WhatsApp number
            const whatsappNumber = "919048222999"; 
            const url = `https://wa.me/${whatsappNumber}?text=${message}`;
            
            window.open(url, '_blank');
        }

        // Start
        initShop();
    </script>
</body>
</html>
